<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Performance in every layer — HOLCIM SYSTEMS</title>
<style>
  /* ============================================================
     BRAND FONTS — Holcim (supplied)
     ============================================================ */
  @font-face{
    font-family:"Holcim"; font-weight:400; font-style:normal; font-display:swap;
    src:url("assets/fonts/Holcim-Regular.woff2") format("woff2");
  }
  @font-face{
    font-family:"Holcim"; font-weight:700; font-style:normal; font-display:swap;
    src:url("assets/fonts/Holcim-Bold.woff2") format("woff2");
  }
  @font-face{
    font-family:"Holcim Headline"; font-weight:300; font-style:normal; font-display:swap;
    src:url("assets/fonts/Holcim-HeadlineLight.woff2") format("woff2");
  }

  /* ============================================================
     DESIGN TOKENS — exact brand values
     ============================================================ */
  :root{
    --bg:            #041739;   /* dark blue  — background          */
    --accent:        #04bbf1;   /* light blue — headline / stat     */
    --text:          #f6f6f6;   /* white      — text / logo         */
    --text-muted:    #f6f6f6;   /* body copy (same white)           */
    --border:        #1d3a63;   /* thin card / sliver borders       */

    --font-display: "Holcim Headline", "Segoe UI", sans-serif;  /* the "every layer" face */
    --font-body:    "Holcim", "Helvetica Neue", Arial, sans-serif;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:var(--bg); color:var(--text); font-family:var(--font-body); }

  .stage{
    position:relative;
    width:100%;
    max-width:1440px;
    margin:0 auto;
    aspect-ratio:1440/1000;
    min-height:480px;
    overflow:hidden;
  }

  /* ---------- top bar ---------- */
  .kicker{
    position:absolute; top:4.55%; left:4.2%;
    font-family:var(--font-body); font-weight:700;   /* PERFORMANCE IN — Holcim Bold 20pt */
    font-size:clamp(11px,1.28vw,18px); line-height:1;
    letter-spacing:.16em; text-transform:uppercase;
  }
  .headline{
    position:absolute; top:6.2%; left:3.6%;
    font-family:var(--font-display);                 /* every layer — Holcim Headline Light */
    font-weight:300; color:var(--accent);
    font-size:clamp(56px,9.7vw,140px);
    line-height:.95; letter-spacing:0;
  }
  /* HOLCIM SYSTEMS lockup — supplied artwork */
  .logo{
    position:absolute; top:4.7%; right:4%;
    width:clamp(150px,16.6vw,240px); height:auto; display:block;
  }

  /* ---------- left content card ---------- */
  .card{
    position:absolute; left:2.2%; top:34%;
    width:52%; height:63%;
    border:3px solid var(--border);
    padding:5% 4.5% 4%;
    display:flex; flex-direction:column;
  }
  .card h2{
    font-family:var(--font-body); font-weight:400;   /* Holcim Regular 43.5pt */
    font-size:clamp(20px,2.78vw,40px);
    line-height:1.15; margin-bottom:6%;
    max-width:15em;
  }
  .card-lower{ display:flex; gap:5%; }
  .card-body{ flex:1 1 55%; }
  .card-body p{
    font-family:var(--font-body); font-weight:400;   /* Holcim Regular 22pt */
    font-size:clamp(12px,1.4vw,20px);
    line-height:1.5; color:var(--text-muted);
  }
  .card-stat{ flex:1 1 40%; }
  .stat-pre{
    font-family:var(--font-body); font-weight:400; color:var(--accent);
    font-size:clamp(10px,1.05vw,15px); line-height:1; margin-bottom:.3em;
  }
  .stat-num{
    font-family:var(--font-display); font-weight:300; color:var(--accent);
    font-size:clamp(26px,3.4vw,52px); line-height:1; white-space:nowrap;
  }
  .stat-num .stat-unit{ font-family:var(--font-body); font-weight:700; font-size:.5em; }
  .stat-label{
    font-weight:700; font-size:clamp(10px,1.05vw,15px);
    letter-spacing:.06em; line-height:1.25; margin-top:.4em;
    text-transform:uppercase;
  }

  /* ---------- right layer fan ---------- */
  .fan{
    position:absolute; right:5.8%; top:34%;   /* rightmost panel aligns with the logo's right edge */
    width:39.2%; height:63%;
    perspective:1600px;
  }
  .fan-inner{ position:relative; width:100%; height:100%; transform-style:preserve-3d; }

  .layer{
    position:absolute; top:0; height:100%;
    border:0; padding:0; cursor:pointer; background:none;
    transform-origin:left center;
    transition:transform .6s cubic-bezier(.5,.05,.2,1),
               width .6s cubic-bezier(.5,.05,.2,1),
               left .6s cubic-bezier(.5,.05,.2,1);
  }
  .layer img{
    width:100%; height:100%; object-fit:cover; display:block;
    box-shadow:-14px 0 34px rgba(0,0,0,.45);
    outline:1px solid rgba(255,255,255,.08);
  }
  .layer:focus-visible img{ outline:2px solid var(--accent); outline-offset:3px; }

  /* subtle darkening on the non-active slivers to sell the depth */
  .layer::after{
    content:""; position:absolute; inset:0;
    background:linear-gradient(90deg, rgba(6,16,40,.0) 0%, rgba(6,16,40,.55) 100%);
    opacity:0; transition:opacity .55s ease; pointer-events:none;
  }
  .layer:not(.is-active)::after{ opacity:1; }

  @media (max-width:760px){
    .card{ width:64%; }
    .fan{ width:38%; }
    .card h2{ margin-bottom:3%; }
    .card-lower{ flex-direction:column; gap:14px; }
  }
</style>
</head>
<body>
  <main class="stage" aria-label="Performance in every layer">
    <div class="kicker">Performance in</div>
    <h1 class="headline">every layer</h1>
    <img class="logo" src="assets/logo.png" alt="HOLCIM SYSTEMS">

    <!-- content pane — updates when a layer is selected -->
    <section class="card" aria-live="polite">
      <h2 id="c-head"></h2>
      <div class="card-lower">
        <div class="card-body"><p id="c-body"></p></div>
        <div class="card-stat">
          <div class="stat-pre" id="c-pre"></div>
          <div class="stat-num" id="c-stat"></div>
          <div class="stat-label" id="c-statlabel"></div>
        </div>
      </div>
    </section>

    <!-- layer fan / navigation -->
    <div class="fan">
      <div class="fan-inner" id="fan"></div>
    </div>
  </main>

<script>
  /* ---- content model: one entry per layer ------------------------------ */
  const LAYERS = [
    { img:"assets/layer-facade.jpg", name:"Facade / cladding",
      head:"Pudi venda doloresae. Ut alit, conecati temquatur, od utemper enduntem",
      body:"Pudi venda doloremos etusandit qui voluptas dolupta tendunto comnimusae. Ut alit, conecati temquatur, od utemper enduntem. Vid quid et, volorum aut laboristist ommoloreriae laut lab ipsuntu sapella volor sam, velliquae nosam, totas eum, id magnimus.",
      pre:"", stat:'50–90 <span class="stat-unit">%</span>', statLabel:"Water run-off reduction" },
    { img:"assets/layer-structural.jpg", name:"Structural frame",
      head:"Sunti dolore magnimen. Ut fugit, dolorem quaturem, si reptae endustem",
      body:"Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex.",
      pre:"from", stat:'25 <span class="stat-unit">L/m²</span>', statLabel:"Water retention" },
    { img:"assets/layer-green.png", name:"Green roof",
      head:"Nam quiatur sapiendi. Et volorum, aut laboristem, od ommolor eveliquam",
      body:"Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation aute pariatur.",
      pre:"", stat:'1°–2°<span class="stat-unit">C</span>', statLabel:"Temp reduction near roof level" },
    { img:"assets/layer-glass.jpg", name:"Glass envelope",
      head:"Ehendit aute quiae. Nos simporum, cuptatiam, si nossimo veribus endant",
      body:"Ehendit aut quiae nossimo. Amet-consectetur ullamco pariatur deserunt occaecat esse ipsum commodo, laboris aliquip dolore minim nostrud est proident veniam, cupidatat sed adipisicing aute-irure.",
      pre:"up to", stat:'8 <span class="stat-unit">dB</span>', statLabel:"Improved sound insulation" }
  ];

  const fan   = document.getElementById('fan');
  const panels = [];

  /* build the clickable panels once — one panel per layer, image never changes */
  LAYERS.forEach((L,i)=>{
    const btn = document.createElement('button');
    btn.className = 'layer';
    btn.type = 'button';
    btn.setAttribute('aria-label', 'Show layer: ' + L.name);
    btn.innerHTML = '<img src="'+L.img+'" alt="'+L.name+'">';
    btn.addEventListener('click', ()=> select(i));
    fan.appendChild(btn);
    panels.push(btn);
  });

  /* fan geometry — horizontal ACCORDION ---------------------------------
     Images keep a fixed left-to-right order. The selected one unfolds WIDE +
     near-frontal IN ITS OWN LANE; the others collapse to thin angled slivers
     (those before it sit on its left, those after it on its right). Panels are
     packed left→right by their VISUAL footprint so they stay edge-to-edge and
     always fill the strip. */
  const N        = LAYERS.length;
  const SEL_FOOT = 57;                    // % — on-screen footprint of the selected panel
  const SLV_FOOT = (100 - SEL_FOOT)/(N-1);// % — footprint of each sliver (fills the rest)
  const SEL_ROT  =  7;                    // deg — selected: near-frontal, tipped OPPOSITE to slivers
  const REST_ROT = -58;                   // deg — slivers: angled edge-on
  const cos      = d => Math.cos(d*Math.PI/180);
  // element width = footprint / cos(angle), so the rotated projection ≈ footprint
  const SEL_W    = SEL_FOOT / cos(SEL_ROT);
  const SLV_W    = SLV_FOOT / cos(REST_ROT);

  let active = 0;

  function layout(){
    let x = 0;                                       // running left edge, in %
    panels.forEach((p,i)=>{
      const sel = (i === active);
      p.classList.toggle('is-active', sel);
      p.style.left      = x + '%';
      p.style.width     = (sel ? SEL_W : SLV_W) + '%';
      p.style.transform = 'rotateY(' + (sel ? SEL_ROT : REST_ROT) + 'deg)';
      // slivers before the selected stack upward to the right; selected on top
      p.style.zIndex    = sel ? 100 : (i < active ? 10 + i : 40 - i);
      x += sel ? SEL_FOOT : SLV_FOOT;                // advance by footprint → edge-to-edge
    });
  }

  function paint(){
    const L = LAYERS[active];
    document.getElementById('c-head').textContent      = L.head;
    document.getElementById('c-body').textContent      = L.body;
    const pre = document.getElementById('c-pre');
    pre.textContent = L.pre || '';
    pre.style.display = L.pre ? 'block' : 'none';
    document.getElementById('c-stat').innerHTML        = L.stat;   // stat contains a small <span> unit
    document.getElementById('c-statlabel').textContent = L.statLabel;
  }

  function select(i){ active = i; layout(); paint(); }

  layout();
  paint();
</script>
</body>
</html>
